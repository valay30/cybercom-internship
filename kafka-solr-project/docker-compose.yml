services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://127.0.0.1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-setup
    depends_on:
      - kafka
    command: >
      sh -c " echo 'Waiting for Kafka...' && cub kafka-ready -b kafka:9092 1 60 && sleep 10 && echo 'Creating topic with 4 partitions...' && kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic csvdata --partitions 4 --replication-factor 1 && echo 'Topic ready!' && kafka-topics --describe --bootstrap-server kafka:9092 --topic csvdata"

  solr:
    image: solr:9
    container_name: solr
    restart: always
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
    command:
      - solr-precreate
      - csvcore

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    restart: always
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: my-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  php-api:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: php-api
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - solr
    environment:
      SOLR_URL: http://solr:8983/solr/csvcore
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: csvdata

  php-consumer:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: php-consumer
    restart: always
    volumes:
      - ./:/app
    depends_on:
      - kafka
      - solr
    environment:
      SOLR_URL: http://solr:8983/solr/csvcore
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: csvdata
    command: [ "php", "/app/consumer.php" ]

  redis:
    image: redis:alpine
    container_name: redis-cache
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - php-api

volumes:
  kafka_data:
  zk_data:
  zk_log:
  solr_data:
  redis_data:
